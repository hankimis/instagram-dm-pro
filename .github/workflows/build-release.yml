name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements_service.txt
          pip install pyinstaller certifi

      - name: Set version from tag
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          (Get-Content insta_service/license/validator.py) -replace 'APP_VERSION = ".*"', "APP_VERSION = `"$version`"" | Set-Content insta_service/license/validator.py
          Write-Host "APP_VERSION set to $version"

      - name: Build exe
        run: |
          python -m PyInstaller --name "InstagramDMPro" --onedir --windowed --noconfirm --icon "assets/icon.ico" --add-data "insta_service;insta_service" --add-data "config.yml;." --add-data "proxies.txt;." --add-data "assets;assets" --add-data "assets/root.json;." --hidden-import nicegui --hidden-import sqlalchemy --hidden-import cryptography --hidden-import engineio.async_drivers.aiohttp --hidden-import certifi --hidden-import tufup --hidden-import bsdiff4 --collect-all nicegui --collect-data certifi start.py

      - name: Zip output
        run: Compress-Archive -Path dist/InstagramDMPro -DestinationPath dist/InstagramDMPro_Windows.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/InstagramDMPro_Windows.zip

      # --- tufup: 아카이브 생성 + 메타데이터 서명 ---
      - name: Restore tufup signing keys
        if: ${{ secrets.TUFUP_PRIVATE_KEY != '' }}
        run: |
          New-Item -ItemType Directory -Force -Path tufup_work/keystore | Out-Null
          [System.IO.File]::WriteAllBytes("tufup_work/keystore/instadmpro", [System.Convert]::FromBase64String("${{ secrets.TUFUP_PRIVATE_KEY }}"))
          [System.IO.File]::WriteAllBytes("tufup_work/keystore/instadmpro.pub", [System.Convert]::FromBase64String("${{ secrets.TUFUP_PUBLIC_KEY }}"))

      - name: Checkout gh-pages for tufup metadata
        if: ${{ secrets.TUFUP_PRIVATE_KEY != '' }}
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Create tufup archive and sign metadata
        if: ${{ secrets.TUFUP_PRIVATE_KEY != '' }}
        run: |
          python scripts/tufup_ci.py --bundle-dir dist/InstagramDMPro --version "${{ github.ref_name }}" --keys-dir tufup_work/keystore --metadata-dir gh-pages/metadata --targets-dir tufup_work/targets

      - name: Upload tufup targets to fixed release
        if: ${{ secrets.TUFUP_PRIVATE_KEY != '' }}
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $archive = "tufup_work/targets/InstagramDMPro-${version}.tar.gz"
          if (Test-Path $archive) {
            gh release upload tufup-targets $archive --clobber
          }
          Get-ChildItem tufup_work/targets/*.patch -ErrorAction SilentlyContinue | ForEach-Object {
            gh release upload tufup-targets $_.FullName --clobber
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push updated metadata to gh-pages
        if: ${{ secrets.TUFUP_PRIVATE_KEY != '' }}
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add metadata/
          git diff --staged --quiet; if ($LASTEXITCODE -ne 0) { git commit -m "Update tufup metadata for ${{ github.ref_name }}"; git push }

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements_service.txt
          pip install pyinstaller certifi

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i '' "s/APP_VERSION = \".*\"/APP_VERSION = \"$VERSION\"/" insta_service/license/validator.py
          echo "APP_VERSION set to $VERSION"

      - name: Build app
        run: |
          python -m PyInstaller --name "InstagramDMPro" --onedir --windowed --noconfirm --icon "assets/icon.icns" --add-data "insta_service:insta_service" --add-data "config.yml:." --add-data "proxies.txt:." --add-data "assets:assets" --add-data "assets/root.json:." --hidden-import nicegui --hidden-import sqlalchemy --hidden-import cryptography --hidden-import engineio.async_drivers.aiohttp --hidden-import certifi --hidden-import tufup --hidden-import bsdiff4 --collect-all nicegui --collect-data certifi --osx-bundle-identifier com.instadmpro.app start.py

      - name: Create DMG
        run: hdiutil create -volname "InstagramDMPro" -srcfolder dist/InstagramDMPro.app -ov -format UDZO dist/InstagramDMPro_macOS.dmg

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/InstagramDMPro_macOS.dmg
